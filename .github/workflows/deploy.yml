name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy data to static
        run: |
          mkdir -p static
          cp -r data-repo/data/tablets static/
          cp -r data-repo/data/drivers static/
          cp -r data-repo/data/pens static/
          cp -r data-repo/data/pen-families static/
          cp -r data-repo/data/tablet-families static/
          cp -r data-repo/data/pen-compat static/
          cp -r data-repo/data/pressure-response static/
          cp -r data-repo/data/inventory static/

      - name: Type-check
        run: npx svelte-kit sync && npm run check

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
